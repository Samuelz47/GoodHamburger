services:
  goodhamburger.api:
    image: goodhamburger-api:latest
    build:
      context: .
      dockerfile: GoodHamburger.API/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/GoodBurger.db
    volumes:
      - sqlite_data:/app/data

volumes:
  sqlite_data: